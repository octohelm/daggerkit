name: release

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - run: mise use --global dagger
      - run: just publish
        env:
          GH_USERNAME: ${{ github.actor }}
          GH_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
